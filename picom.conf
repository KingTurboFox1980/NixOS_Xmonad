# picom configuration - Optimized for GLX and colored shadows

#################################
#          Animations           #
#################################
# requires https://github.com/jonaburg/picom
# (These are also the default values)
transition-length = 500
transition-pow-x = 0.1
transition-pow-y = 0.1
transition-pow-w = 0.1
transition-pow-h = 0.1
size-transition = true

# --- SHADOW FIX ---
# Forces the shadow color to be used instead of defaulting to a black alpha mask.
# This should fix the issue where the shadow color (like purple) appears black.
paint-shadow-with-alpha = true;

# --------------------------------------------------------------#
# D Y N A M I C   B E H A V I O R S (Shadow & Illumination)     #
# --------------------------------------------------------------#

# Shadow settings
shadow = true;
shadow-radius = 5;
shadow-opacity = 0.6;
shadow-offset-x = 0;
shadow-offset-y = 0;
shadow-ignore-shaped = false;
shadow-exclude = [ ];

#################################
#             Corners           #
#################################
# requires: https://github.com/sdhand/compton or https://github.com/jonaburg/picom
corner-radius = 5.0;
rounded-corners-exclude = [
  #"window_type = 'normal'",
  "class_g = 'awesome'",
  "class_g = 'URxvt'",
  "class_g = 'XTerm'",
  "class_g = 'cider'",
  "class_g = 'Alacritty'",
  "class_g = 'Polybar'",
  "class_g = 'code-oss'",
  "class_g = 'trayer'",
  #"class_g = 'firefox'",
  "class_g = 'xmobar'",
  "class_g = 'Virt-manager'"
];
round-borders = 1;
round-borders-exclude = [
  #"class_g = 'TelegramDesktop'",
];

#################################
#           Fading              #
#################################


# Fade windows in/out when opening/closing and when opacity changes,
#  unless no-fading-openclose is used.
# fading = false
fading = true;

# Opacity change between steps while fading in. (0.01 - 1.0, defaults to 0.028)
# fade-in-step = 0.028
fade-in-step = 0.025;

# Opacity change between steps while fading out. (0.01 - 1.0, defaults to 0.03)
# fade-out-step = 0.03
fade-out-step = 0.009;

# The time between steps in fade step, in milliseconds. (> 0, defaults to 10)
fade-delta = 7

# Specify a list of conditions of windows that should not be faded.
# don't need this, we disable fading for all normal windows with wintypes: {}
fade-exclude = [
  "class_g = 'slop'"   # maim
]

# Do not fade on window open/close.
# no-fading-openclose = false

# Do not fade destroyed ARGB windows with WM frame. Workaround of bugs in Openbox, Fluxbox, etc.
# no-fading-destroyed-argb = false


#################################
#   Transparency / Opacity      #
#################################


# Opacity of inactive windows. (0.1 - 1.0, defaults to 1.0)
# inactive-opacity = 1
inactive-opacity = 0.8;

# Opacity of window titlebars and borders. (0.1 - 1.0, disabled by default)
# frame-opacity = 1.0
frame-opacity = 0.7;

#If using these 2 below change their values in line 510 & 511 aswell
popup_menu = { opacity = 0.5; }
dropdown_menu = { opacity = 0.5; }


# Let inactive opacity set by -i override the '_NET_WM_OPACITY' values of windows.
# inactive-opacity-override = true
inactive-opacity-override = false;

# Default opacity for active windows. (0.0 - 1.0, defaults to 1.0)
active-opacity = 1.0;

# Dim inactive windows. (0.0 - 1.0, defaults to 0.0)
# inactive-dim = 0.4

# Specify a list of conditions of windows that should always be considered focused.
# focus-exclude = []
focus-exclude = [
  "class_g = 'Cairo-clock'",
  "class_g = 'Bar'",                    # lemonbar
  "class_g = 'slop'"                    # maim
];

# Use fixed inactive dim value, instead of adjusting according to window opacity.
# inactive-dim-fixed = 0.7

# Specify a list of opacity rules, in the format `PERCENT:PATTERN`,
# like `50:name *= "Firefox"`. picom-trans is recommended over this.
# Note we don't make any guarantee about possible conflicts with other
# programs that set '_NET_WM_WINDOW_OPACITY' on frame or client windows.
# example:
#    opacity-rule = [ "80:class_g = 'URxvt'" ];
#
# opacity-rule = []
opacity-rule = [
  "80:class_g     = 'Bar'",             # lemonbar
  "75:class_g     = 'Neohtop'",
  "95:class_g     = 'Org.gnome.Evolution'",
  "95:class_g     = 'eu.betterbird.Betterbird'",
  "100:class_g    = 'Code' && focused",
  "85:class_g     = 'Code' && !focused",
  "95:class_g     = 'kitty' && focused",
  "55:class_g     = 'kitty' && !focused",
  "95:class_g     = 'Thunar' && focused",
  "50:class_g     = 'Thunar' && !focused",
  "90:class_g     = 'thunar-scratchpad'",
  "95:class_g     = '.virt-manager-wrapped'",
  "80:class_g     = 'dwm'",
  "75:class_g     = 'Alacritty'",
  "90:class_g     = 'zen'",
  "90:class_g     = 'floorp'",
  "95:class_g     = 'Vivaldi-stable'",
  "80:class_g     = 'Timeshift-gtk'",
  "60:class_g     = 'rclone-browser'",
  "70:class_g     = 'Rofi'",
  "75:class_g     = 'qBittorrent'"
];

################################
#     Background-Blurring      # 
################################

# The following options are the modern, recommended way to configure blur 
# in the Jonaburg fork (assuming you are using the 'glx' backend).

blur: {
  # The method you chose for optimal GLX blur.
  method = "dual_kawase"; 
  strength = 5;
  # Kern is specified here, making the legacy 'blur-kern' line unnecessary.
  kern = "3x3box"; 
  
  # These are options for the old blur method and are often set to false or omitted
  # when using 'dual_kawase'. Keeping them here for clarity based on your original file.
  background = false;
  background-frame = false;
  background-fixed = false;
}

# This setting controls blur on ARGB (transparent) windows themselves.
# NOTE: Using this legacy line is fine, but ensure the redundant settings below are REMOVED.
blur-background = true; 

# Exclude conditions for background blur.
blur-background-exclude = [
  "class_g = 'slop'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#       General Settings        #
#################################

# Daemonize process. Fork to background after initialization. Causes issues with certain (badly-written) drivers.
# daemon = false

# Specify the backend to use: `xrender`, `glx`, or `xr_glx_hybrid`.
# `xrender` is the default one.
#
experimental-backends = true;
backend = "glx";

# GLX backend: GLX buffer swap method. 
# Try 'copy' (1) to fix potential color issues on some drivers.
glx-swap-method = 1

# Enable/disable VSync.
# vsync = false
vsync = true

# Enable remote control via D-Bus. See the *D-BUS API* section below for more details.
# dbus = false

# Try to detect WM windows (a non-override-redirect window with no
# child that has 'WM_STATE') and mark them as active.
#
# mark-wmwin-focused = false
mark-wmwin-focused = true;

# Mark override-redirect windows that doesn't have a child window with 'WM_STATE' focused.
# mark-ovredir-focused = false
mark-ovredir-focused = true;

# Try to detect windows with rounded corners and don't consider them
# shaped windows. The accuracy is not very high, unfortunately.
#
detect-rounded-corners = false
# detect-rounded-corners = true;

# Detect '_NET_WM_OPACITY' on client windows, useful for window managers
# not passing '_NET_WM_OPACITY' of client windows to frame windows.
#
# detect-client-opacity = false
detect-client-opacity = true;

# Specify refresh rate of the screen. If not specified or 0, picom will
# try detecting this with X RandR extension.
#
# refresh-rate = 60
refresh-rate = 100

# Limit picom to repaint at most once every 1 / 'refresh_rate' second to
# boost performance. This should not be used with
#   vsync drm/opengl/opengl-oml
# as they essentially does sw-opti's job already,
# unless you wish to specify a lower refresh rate than the actual value.
#
# sw-opti =

# Use EWMH '_NET_ACTIVE_WINDOW' to determine currently focused window,
# rather than listening to 'FocusIn'/'FocusOut' event. Might have more accuracy,
# provided that the WM supports it.
#
# use-ewmh-active-win = false

# Unredirect all windows if a full-screen opaque window is detected,
# to maximize performance for full-screen windows. Known to cause flickering
# when redirecting/unredirecting windows. paint-on-overlay may make the flickering less obvious.
#
# unredir-if-possible = false

# Delay before unredirecting the window, in milliseconds. Defaults to 0.
# unredir-if-possible-delay = 0

# Conditions of windows that shouldn't be considered full-screen for unredirecting screen.
# unredir-if-possible-exclude = []

# Use 'WM_TRANSIENT_FOR' to group windows, and consider windows
# in the same group focused at the same time.
#
# detect-transient = false
detect-transient = true

# Use 'WM_CLIENT_LEADER' to group windows, and consider windows in the same
# group focused at the same time. 'WM_TRANSIENT_FOR' has higher priority if
# detect-transient is enabled, too.
#
# detect-client-leader = false
detect-client-leader = true

# Resize damaged region by a specific number of pixels.
# A positive value enlarges it while a negative one shrinks it.
# If the value is positive, those additional pixels will not be actually painted
# to screen, only used in blur calculation, and such. (Due to technical limitations,
# with use-damage, those pixels will still be incorrectly painted to screen.)
# Primarily used to fix the line corruption issues of blur,
# in which case you should use the blur radius value here
# (e.g. with a 3x3 kernel, you should use `--resize-damage 1`,
# with a 5x5 one you use `--resize-damage 2`, and so on).
# May or may not work with *--glx-no-stencil*. Shrinking doesn't function correctly.
#
# resize-damage = 1

# Specify a list of conditions of windows that should be painted with inverted color.
# Resource-hogging, and is not well tested.
#
# invert-color-include = []

# GLX backend: Use color-gbuffers for rendering.
# **CRITICAL FIX for colored shadows appearing black on GLX.**
glx-use-color-gbuffers = true

# GLX backend: Avoid using stencil buffer, useful if you don't have a stencil buffer.
# Might cause incorrect opacity when rendering transparent content (but never
# practically happened) and may not work with blur-background.
# My tests show a 15% performance boost. Recommended.
# **CRITICAL FIX for colored shadows on GLX.**
glx-no-stencil = false

# GLX backend: Avoid rebinding pixmap on window damage.
# Probably could improve performance on rapid window content changes,
# but is known to break things on some drivers (LLVMpipe, xf86-video-intel, etc.).
# Recommended if it works.
# **This is the final known config fix for forcing color on GLX.**
glx-no-rebind-pixmap = false

# Disable the use of damage information.
# This cause the whole screen to be redrawn everytime, instead of the part of the screen
# has actually changed. Potentially degrades the performance, but might fix some artifacts.
# The opposing option is use-damage
#
# no-use-damage = false
#use-damage = true (Causing Weird Black semi opaque rectangles when terminal is opened)
#Changing use-damage to false fixes the problem
use-damage = true

# Use X Sync fence to sync clients' draw calls, to make sure all draw
# calls are finished before picom starts drawing. Needed on nvidia-drivers
# with GLX backend for some users.
#
# xrender-sync-fence = false

# GLX backend: Use specified GLSL fragment shader for rendering window contents.
# See `compton-default-fshader-win.glsl` and `compton-fake-transparency-fshader-win.glsl`
# in the source tree for examples.
#
# glx-fshader-win = ''

# Force all windows to be painted with blending. Useful if you
# have a glx-fshader-win that could turn opaque pixels transparent.
#
# force-win-blend = false

# Do not use EWMH to detect fullscreen windows.
# Reverts to checking if a window is fullscreen based only on its size and coordinates.
#
# no-ewmh-fullscreen = false

# Dimming bright windows so their brightness doesn't exceed this set value.
# Brightness of a window is estimated by averaging all pixels in the window,
# so this could comes with a performance hit.
# Setting this to 1.0 disables this behaviour. Requires --use-damage to be disabled. (default: 1.0)
#
# max-brightness = 1.0

# Make transparent windows clip other windows like non-transparent windows do,
# instead of blending on top of them.
#
# transparent-clipping = false

# Set the log level. Possible values are:
#  "trace", "debug", "info", "warn", "error"
# in increasing level of importance. Case doesn't matter.
# If using the "TRACE" log level, it's better to log into a file
# using *--log-file*, since it can generate a huge stream of logs.
#
# log-level = "debug"
log-level = "warn";

# Set the log file.
# If *--log-file* is never specified, logs will be written to stderr.
# Otherwise, logs will to written to the given file, though some of the early
# logs might still be written to the stderr.
# When setting this option from the config file, it is recommended to use an absolute path.
#
# log-file = '/path/to/your/log/file'

# Show all X errors (for debugging)
# show-all-xerrors = false

# Write process ID to a file.
# write-pid-path = '/path/to/your/log/file'

# Window type settings
#
# 'WINDOW_TYPE' is one of the 15 window types defined in EWMH standard:
#     "unknown", "desktop", "dock", "toolbar", "menu", "utility",
#     "splash", "dialog", "normal", "dropdown_menu", "popup_menu",
#     "tooltip", "notification", "combo", and "dnd".
#
# Following per window-type options are available: ::
#
#   fade, shadow:::
#     Controls window-type-specific shadow and fade settings.
#
#   opacity:::
#     Controls default opacity of the window type.
#
#   focus:::
#     Controls whether the window of this type is to be always considered focused.
#     (By default, all window types except "normal" and "dialog" has this on.)
#
#   full-shadow:::
#     Controls whether shadow is drawn under the parts of the window that you
#     normally won't be able to see. Useful when the window has parts of it
#     transparent, and you want shadows in those areas.
#
#   redir-ignore:::
#     Controls whether this type of windows should cause screen to become
#     redirected again after been unredirected. If you have unredir-if-possible
#     set, and doesn't want certain window to cause unnecessary screen redirection,
#     you can set this to `true`.
#
wintypes: {
  normal = { 
    fade = false; 
    shadow = true; 
    opacity = 1.0; # Ensure default windows remain fully visible
  };

  menu = { 
    blur-background = false; 
    fade = true;  
    opacity = 0.88; # Slight opacity reduction for cleaner contrast
    shadow = true;  # Adds a subtle shadow for depth effect
  };

  tooltip = { 
    fade = true;  
    shadow = true;  
    opacity = 0.75;  
    focus = true;  
    full-shadow = false;  
    blur-background = true;  
    blur-strength = 30; # Keeps tooltip blur smooth but not excessive
  };
  # Polybar (Standard EWMH Wintype)
  dock = {
    shadow = true;
    full-shadow = true;   # critical for glow
    blur-background = false;
    opacity = 0.5;
  };
  
  # Explicit Wintype for Polybar/Lemonbar using the class_g string 'Bar'
  # Quotes removed to fix the libconfig syntax error.
  Bar = {
    shadow = true;
    opacity = 0.5;
    blur-background = false;
  };
  
  dnd = { 
    shadow = false;  
    opacity = 0.85;  
    blur-background = false; # Prevent blur effects on drag-and-drop elements
  };

  popup_menu = { 
    opacity = 0.75;  
    full-shadow = true;  
    blur-background = true;  
    blur-strength = 40; # Increased depth effect for popups
    blur-kernel = "9x9box";  
  };

  dropdown_menu = { 
    opacity = 0.75;  
    full-shadow = true;  
    blur-background = true;  
    blur-strength = 35; # Matches popup menu effect
  };

  utility = { 
    full-shadow = true;  
    fade = true;  
    opacity = 0.92; # Fine-tuned for smooth transparency
  };

  toolbar = { 
    full-shadow = true;  
    opacity = 0.60;  
    blur-background = false; # Toolbars should remain readable without blur
  };

  notification = { 
    opacity = 1.0;  
    shadow = true;  
    blur-background = true;  
    blur-strength = 45; # Higher blur effect for clean notification contrast
  };
};